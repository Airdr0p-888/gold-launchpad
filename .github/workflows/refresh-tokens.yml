name: Refresh Token Market Data

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh tokens.json
        env:
          AVE_API_KEY: ${{ secrets.AVE_API_KEY }}
        run: node refresh-tokens.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens.json
          if git diff --staged --quiet; then
            echo "No changes to tokens.json"
          else
            git commit -m "chore: refresh token market data [skip ci]"
            git push
          fi
